<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>My Information</title>
  </head>
  <body>
    <div class="container">
      <div class="avt">
        <img src="./img/avt.jpg" alt="ảnh đại diện" class="avt_image" />
        <h3>Nguyễn Thu Thủy</h3>
      </div>
      <div class="social_links">
        <ul>
          <li>
            <a href="https://www.facebook.com/minhvi.tran.372"
              ><i class="fab fa-facebook"></i><span>Facebook</span></a
            >
          </li>
          <li>
            <a href="https://www.tiktok.com/@_thury.04?_t=ZS-8tLvf7Xc1Q5&_r=1"
              ><i class="fab fa-tiktok"></i><span>Tiktok</span></a
            >
          </li>
          <li>
            <a href="https://www.instagram.com/_thury.04/profilecard/"
              ><i class="fab fa-instagram"></i><span>Instagram</span></a
            >
          </li>
          <li>
            <a href="tel:+84866302204"
              ><i class="fas fa-phone"></i><span>Telephone</span></a
            >
          </li>
          <li>
            <a href="mailto:tt598072@gmail.com"
              ><i class="fas fa-paper-plane"></i><span>Email</span></a
            >
          </li>
          <li>
            <a href="#" id="wechatBtn">
              <i class="fab fa-weixin"></i>
              <span>WeChat</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <!-- WeChat QR Modal -->
    <div id="wechatModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Quét mã kết bạn nhé!</h3>
        <img src="./img/qr_wechat.jpg" alt="WeChat QR" class="wechat-qr" />
      </div>
    </div>
    <script>
      const wechatBtn = document.getElementById("wechatBtn");
      const modal = document.getElementById("wechatModal");
      const closeBtn = document.querySelector(".close");

      wechatBtn.addEventListener("click", function (e) {
        e.preventDefault();
        modal.style.display = "flex";
      });

      closeBtn.addEventListener("click", function () {
        modal.style.display = "none";
      });

      window.addEventListener("click", function (e) {
        if (e.target === modal) {
          modal.style.display = "none";
        }
      });
      (function () {
        const url = new URL(window.location);

        const paramsToRemove = [
          "fbclid",
          "utm_source",
          "utm_medium",
          "utm_campaign",
        ];

        paramsToRemove.forEach((param) => {
          url.searchParams.delete(param);
        });

        window.history.replaceState(
          {},
          document.title,
          url.pathname + url.search,
        );
      })();
    </script>
  </body>
</html>
